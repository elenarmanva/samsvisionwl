<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>San Andreas Medical Center</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .page { display: none; }
    .page.active { display: block; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .animate-in { animation: fadeIn 0.8s ease-out forwards; }
    .animate-in-delay { animation: fadeIn 0.8s ease-out 0.3s forwards; opacity: 0; }
    .card-hover { transition: transform 0.3s, box-shadow 0.3s; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
    @keyframes pulse-glow { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }
    .pulse-glow { animation: pulse-glow 3s ease-in-out infinite; }
    .stat-animate { animation: fadeIn 0.6s ease-out forwards; }
    .divider-gradient { height: 1px; background: linear-gradient(90deg, transparent, rgba(34,211,238,0.3), transparent); }
    #mobile-menu { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
    #mobile-menu.active { max-height: 500px; }
    @keyframes float-cross { 0%, 100% { transform: translateY(0px) rotateZ(0deg); opacity: 0.25; } 50% { transform: translateY(-20px) rotateZ(5deg); opacity: 0.45; } }
    .floating-cross { position: fixed; font-size: 4rem; font-weight: bold; animation: float-cross 6s ease-in-out infinite; pointer-events: none; z-index: 1; }
    @keyframes slideInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
    .scroll-animate { opacity: 0; }
    .scroll-animate.visible { animation: slideInUp 0.7s ease-out forwards; }
    @keyframes heartbeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    .staff-card { transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .staff-card:hover { transform: scale(1.1) translateY(-8px); }
    
    @keyframes modalZoom { 
      0% { opacity: 0; transform: scale(0.3) translateY(100px); } 
      50% { transform: scale(1.05); }
      100% { opacity: 1; transform: scale(1); } 
    }
    @keyframes modalBackdropFade { from { opacity: 0; backdrop-filter: blur(0px); } to { opacity: 1; backdrop-filter: blur(4px); } }
    @keyframes ecgLine { 0% { width: 0%; opacity: 1; } 50% { width: 100%; opacity: 1; } 100% { width: 100%; opacity: 0; } }
    @keyframes shockwave { 0% { width: 0; height: 0; opacity: 1; } 100% { width: 200%; height: 200%; opacity: 0; } }
    @keyframes medicalParticle { 0% { opacity: 1; transform: translate(0, 0) scale(1) rotate(0deg); } 100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.5) rotate(360deg); } }
    
    #staff-modal.modal-open { animation: modalZoom 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    #staff-modal { backdrop-filter: blur(0px); transition: backdrop-filter 0.5s ease-out; }
    #staff-modal:not(.hidden) { animation: modalBackdropFade 0.5s ease-out forwards; }
    .ecg-line { position: absolute; top: 0; left: 0; height: 2px; background: linear-gradient(90deg, transparent, #06b6d4, transparent); animation: ecgLine 0.8s ease-in-out forwards; }
    .shockwave-effect { position: absolute; border: 2px solid #06b6d4; border-radius: 50%; animation: shockwave 0.6s ease-out forwards; }
    .medical-particle { position: fixed; font-size: 1.5rem; font-weight: bold; color: #06b6d4; pointer-events: none; animation: medicalParticle 0.8s ease-out forwards; z-index: 100; }
    .pulse-intense { animation: heartbeat 0.4s ease-in-out forwards; }
  </style>
</head>
<body class="w-full min-h-screen bg-[#0a0f1a]" style="background: rgb(10, 15, 26);">
  <nav class="fixed top-0 w-full z-50 border-b border-white/5" style="background: rgba(10,15,26,0.92); backdrop-filter: blur(20px);">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <img class="w-12 h-12 rounded-full object-cover" src="assets/logo-sams.png" alt="Logo">
        <div>
          <span class="font-semibold text-lg text-white block">SAMS</span>
          <p class="text-xs text-cyan-300/70">Centre Hospitalier du Serveur Vision WL</p>
        </div>
      </div>
      <div id="nav-menu" class="hidden md:flex gap-8">
        <a href="#accueil" class="text-sm font-medium text-gray-300 hover:text-white transition">Accueil</a>
        <a href="#poles" class="text-sm font-medium text-gray-300 hover:text-white transition">Pôles médicaux</a>
        <a href="#equipe" class="text-sm font-medium text-gray-300 hover:text-white transition">Équipe</a>
        <a href="#recrutement" class="text-sm font-medium text-gray-300 hover:text-white transition">Recrutement</a>
        <a href="#contact" class="text-sm font-medium text-gray-300 hover:text-white transition">Contact</a>
      </div>
      <button id="mobile-toggle" class="md:hidden text-white" aria-label="Menu" type="button"><i data-lucide="menu" class="w-6 h-6"></i></button>
    </div>
    <div id="mobile-menu" class="md:hidden bg-[#111827] border-t border-white/5">
      <div class="px-6 py-4 space-y-3 flex flex-col">
        <a href="#accueil" class="text-sm font-medium text-gray-300 hover:text-white transition py-2">Accueil</a>
        <a href="#poles" class="text-sm font-medium text-gray-300 hover:text-white transition py-2">Pôles médicaux</a>
        <a href="#equipe" class="text-sm font-medium text-gray-300 hover:text-white transition py-2">Équipe</a>
        <a href="#recrutement" class="text-sm font-medium text-gray-300 hover:text-white transition py-2">Recrutement</a>
        <a href="#contact" class="text-sm font-medium text-gray-300 hover:text-white transition py-2">Contact</a>
      </div>
    </div>
  </nav>

  <div id="page-accueil" class="page pt-20">
    <header class="relative" style="height: 50vh;">
      <img class="absolute inset-0 w-full h-full object-cover opacity-40" src="assets/hero-bg.png" alt="SAMS">
      <div class="absolute inset-0 bg-gradient-to-t from-[#0a0f1a] to-transparent"></div>
      <div class="absolute inset-0 flex items-center justify-center">
        <div class="text-center px-6">
          <h1 class="text-4xl md:text-6xl font-bold text-white mb-4">San Andreas Medical Center</h1>
          <a href="#contact" class="inline-block px-8 py-3 bg-cyan-500 hover:bg-cyan-400 text-black font-bold rounded-full">Nous contacter</a>
        </div>
      </div>
    </header>
  </div>

  <script>
    document.getElementById('mobile-toggle').addEventListener('click', () => document.getElementById('mobile-menu').classList.toggle('active'));
    
    function navigate() {
      const hash = window.location.hash || '#accueil';
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      const map = { '#accueil': 'page-accueil', '#poles': 'page-poles', '#equipe': 'page-equipe', '#recrutement': 'page-recrutement', '#contact': 'page-contact' };
      const el = document.getElementById(map[hash] || 'page-accueil');
      if (el) el.classList.add('active');
    }
    window.addEventListener('hashchange', navigate);
    navigate();
    lucide.createIcons();
  </script>
</body>
</html>
